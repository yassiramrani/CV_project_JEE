<div class="auth-container">
  <div class="glass-panel auth-card">
    <h2 class="text-gradient">Welcome Back</h2>
    <p class="subtitle">Sign in to your RecruitAI account</p>

    <div *ngIf="error" class="error-banner">
      {{ error }}
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          class="form-control" 
          [(ngModel)]="credentials.email" 
          required 
          placeholder="name@example.com">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          class="form-control" 
          [(ngModel)]="credentials.password" 
          required 
          placeholder="••••••••">
      </div>

      <button type="submit" class="btn-primary w-100 mt-4" [disabled]="loading || !loginForm.valid">
        <span *ngIf="loading">Signing in...</span>
        <span *ngIf="!loading">Sign In</span>
      </button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a routerLink="/register" class="text-gradient">Register here</a>
    </p>
  </div>
</div>
